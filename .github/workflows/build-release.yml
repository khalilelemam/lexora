name: Build and Release Desktop App

on:
  push:
    tags:
      - 'lexora-v*'

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: tobii-service    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4      
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller      
      
      - name: Build executable
        run: pyinstaller lexora-windows.spec      
      
      - name: Install NSIS
        run: choco install nsis -y      
      
      - name: Create NSIS Installer Script
        run: |
          $nsiScript = @'
          !include "MUI2.nsh"
          
          ; Installer settings
          Name "Lexora Setup"
          OutFile "dist\Lexora-Setup.exe"
          InstallDir "$PROGRAMFILES\Lexora"
          
          ; Require Admin rights to install to Program Files
          RequestExecutionLevel admin
          
          ; Standard Wizard UI Pages
          !insertmacro MUI_PAGE_WELCOME
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_PAGE_FINISH
          !insertmacro MUI_LANGUAGE "English"
          
          Section "Install"
            SetOutPath "$INSTDIR"
            
            ; Grab the entire folder built by PyInstaller
            File /r "dist\Lexora\*" 
            
            CreateDirectory "$SMPROGRAMS\Lexora"
            CreateShortCut "$SMPROGRAMS\Lexora\Lexora.lnk" "$INSTDIR\Lexora.exe"
            CreateShortCut "$DESKTOP\Lexora.lnk" "$INSTDIR\Lexora.exe"
            
            WriteUninstaller "$INSTDIR\Uninstall.exe"
            CreateShortCut "$SMPROGRAMS\Lexora\Uninstall.lnk" "$INSTDIR\Uninstall.exe"
          SectionEnd
          
          Section "Uninstall"
            RMDir /r "$INSTDIR"
            
            Delete "$SMPROGRAMS\Lexora\Lexora.lnk"
            Delete "$SMPROGRAMS\Lexora\Uninstall.lnk"
            Delete "$DESKTOP\Lexora.lnk"
            RMDir "$SMPROGRAMS\Lexora"
          SectionEnd
          '@
          
          $nsiScript | Out-File -Encoding ASCII "installer.nsi"
      
      - name: Build Windows Installer
        run:
          &"C:\Program Files (x86)\NSIS\makensis.exe"installer.nsi
      
      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: lexora-windows
          # strictly target the setup file, NOT the app folder
          path: tobii-service/dist/Lexora-Setup.exe 

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: tobii-service    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4      
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller      
      
      - name: Build executable
        run: pyinstaller lexora-macos.spec      
      
      - name: Create PKG Installer Wizard
        run: |
          pkgbuild --root "dist/Lexora.app" \
                   --identifier "com.eglex.lexora" \
                   --version "1.0.0" \
                   --install-location "/Applications/Lexora.app" \
                   "dist/Lexora-macOS-Installer.pkg"
      
      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: lexora-macos
          path: tobii-service/dist/Lexora-macOS-Installer.pkg

  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tobii-service    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4      
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
      
      - name: Build executable
        run: pyinstaller lexora-linux.spec
      
      - name: Create Debian (.deb) Installer
        run: |
          mkdir -p dist/lexora_1.0_amd64/DEBIAN
          mkdir -p dist/lexora_1.0_amd64/opt/lexora
          mkdir -p dist/lexora_1.0_amd64/usr/bin
          mkdir -p dist/lexora_1.0_amd64/usr/share/applications

          cat > dist/lexora_1.0_amd64/DEBIAN/control << 'EOF'
          Package: lexora
          Version: 1.0
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: Lexora Team
          Description: Lexora Eye Tracker Service
           Cross-platform eye tracking service with setup wizard.
          EOF

          cp dist/Lexora dist/lexora_1.0_amd64/opt/lexora/
          chmod +x dist/lexora_1.0_amd64/opt/lexora/Lexora

          ln -s /opt/lexora/Lexora dist/lexora_1.0_amd64/usr/bin/lexora

          cat > dist/lexora_1.0_amd64/usr/share/applications/lexora.desktop << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Lexora
          Exec=/opt/lexora/Lexora
          Icon=lexora
          Categories=Utility;
          EOF

          dpkg-deb --build dist/lexora_1.0_amd64
          mv dist/lexora_1.0_amd64.deb dist/Lexora-Linux-Installer.deb
      
      - name: Upload Linux installer
        uses: actions/upload-artifact@v4
        with:
          name: lexora-linux
          path: tobii-service/dist/Lexora-Linux-Installer.deb

  create-source-archives:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4      
      - name: Create source code zip
        run: zip -r Lexora-source-code.zip . -x ".git/*" ".github/*" "*.pyc" "__pycache__/*" ".DS_Store"
      - name: Create source code tar.gz
        run: tar --exclude='.git' --exclude='.github' --exclude='*.pyc' --exclude='__pycache__' --exclude='.DS_Store' -czf Lexora-source-code.tar.gz .
      - name: Upload source archives
        uses: actions/upload-artifact@v4
        with:
          name: source-code
          path: |
            Lexora-source-code.zip
            Lexora-source-code.tar.gz

  create-release:
    needs: [build-windows, build-macos, build-linux, create-source-archives]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4      
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/lexora-windows/Lexora-Setup.exe
            artifacts/lexora-macos/Lexora-macOS-Installer.pkg
            artifacts/lexora-linux/Lexora-Linux-Installer.deb
            artifacts/source-code/Lexora-source-code.zip
            artifacts/source-code/Lexora-source-code.tar.gz
          draft: false
          prerelease: true
          body: |
            ## Lexora Eye Tracker Service
            
            Cross-platform eye tracking service with native setup wizards.
            
            ### Installation
            
            **Windows:**
            - Download `Lexora-Setup.exe`
            - Double-click to run the setup wizard
            
            **macOS:**
            - Download `Lexora-macOS-Installer.pkg`
            - Double-click to run the installer
            
            **Linux (Ubuntu/Debian):**
            - Download `Lexora-Linux-Installer.deb`
            - Double click to install via Software Center, or run: `sudo dpkg -i Lexora-Linux-Installer.deb`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
