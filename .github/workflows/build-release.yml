name: Build and Release Desktop App

on:
  push:
    tags:
      - "lexora-v*"

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: tobii-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller      

      - name: Set version and token from tag/secrets
        shell: pwsh
        env:
          UPDATER_TOKEN: ${{ secrets.UPDATER_GITHUB_TOKEN }}
        run: |
          $version = "$env:GITHUB_REF_NAME" -replace '^lexora-v', ''
          (Get-Content app/config.py) -replace 'VERSION: str = ".*"', "VERSION: str = `"$version`"" | Set-Content app/config.py
          if ($env:UPDATER_TOKEN) {
            (Get-Content app/config.py) -replace 'GITHUB_TOKEN: str = ".*"', "GITHUB_TOKEN: str = `"$env:UPDATER_TOKEN`"" | Set-Content app/config.py
            Write-Host "Injected version: $version and GitHub Token"
          } else {
            Write-Host "Injected version: $version (No GitHub Token provided)"
          }

      - name: Build executable
        run: pyinstaller lexora-windows.spec

      - name: Install NSIS
        run: choco install nsis -y

      - name: Create NSIS Installer Script
        run: |
          $nsiScript = @'
          !include "MUI2.nsh"

          ; Installer settings
          Name "Lexora Setup"
          OutFile "dist\Lexora-Setup.exe"
          InstallDir "$PROGRAMFILES\Lexora"

          ; Require Admin rights to install to Program Files
          RequestExecutionLevel admin

          ; Standard Wizard UI Pages
          !insertmacro MUI_PAGE_WELCOME
          !insertmacro MUI_PAGE_DIRECTORY
          !insertmacro MUI_PAGE_INSTFILES
          !insertmacro MUI_PAGE_FINISH
          !insertmacro MUI_LANGUAGE "English"

          Section "Install"
            SetOutPath "$INSTDIR"
            
            ; Grab the standalone executable generated by PyInstaller
            File "dist\Lexora.exe" 
            
            CreateDirectory "$SMPROGRAMS\Lexora"
            CreateShortCut "$SMPROGRAMS\Lexora\Lexora.lnk" "$INSTDIR\Lexora.exe"
            CreateShortCut "$DESKTOP\Lexora.lnk" "$INSTDIR\Lexora.exe"
            
            WriteUninstaller "$INSTDIR\Uninstall.exe"
            CreateShortCut "$SMPROGRAMS\Lexora\Uninstall.lnk" "$INSTDIR\Uninstall.exe"

            ; Register lexora:// protocol
            WriteRegStr HKCR "lexora" "" "URL:Lexora Protocol"
            WriteRegStr HKCR "lexora" "URL Protocol" ""
            WriteRegStr HKCR "lexora\shell\open\command" "" '"$INSTDIR\Lexora.exe" "%1"'
          SectionEnd

          Section "Uninstall"
            ; Remove lexora:// protocol
            DeleteRegKey HKCR "lexora"
            Delete "$INSTDIR\Lexora.exe"
            Delete "$INSTDIR\Uninstall.exe"
            RMDir /r "$INSTDIR"
            
            Delete "$SMPROGRAMS\Lexora\Lexora.lnk"
            Delete "$SMPROGRAMS\Lexora\Uninstall.lnk"
            Delete "$DESKTOP\Lexora.lnk"
            RMDir /r "$SMPROGRAMS\Lexora"
          SectionEnd
          '@

          $nsiScript | Out-File -Encoding ASCII "installer.nsi"

      - name: Build Windows Installer
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: lexora-windows
          path: tobii-service/dist/Lexora-Setup.exe

  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: tobii-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller      

      - name: Set version and token from tag/secrets
        env:
          UPDATER_TOKEN: ${{ secrets.UPDATER_GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#lexora-v}"
          sed -i '' "s/VERSION: str = \".*\"/VERSION: str = \"${VERSION}\"/" app/config.py
          if [ ! -z "$UPDATER_TOKEN" ]; then
            sed -i '' "s/GITHUB_TOKEN: str = \".*\"/GITHUB_TOKEN: str = \"${UPDATER_TOKEN}\"/" app/config.py
            echo "Injected version: $VERSION and GitHub Token"
          else
            echo "Injected version: $VERSION (No GitHub Token provided)"
          fi

      - name: Build executable
        run: pyinstaller lexora-macos.spec

      - name: Create PKG Installer Wizard
        run: |
          pkgbuild --root "dist/Lexora.app" \
                   --identifier "com.eglex.lexora" \
                   --version "${GITHUB_REF_NAME#lexora-v}" \
                   --install-location "/Applications/Lexora.app" \
                   "dist/Lexora-macOS-Installer.pkg"

      - name: Upload macOS installer
        uses: actions/upload-artifact@v4
        with:
          name: lexora-macos
          path: tobii-service/dist/Lexora-macOS-Installer.pkg

  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tobii-service
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Set version and token from tag/secrets
        env:
          UPDATER_TOKEN: ${{ secrets.UPDATER_GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#lexora-v}"
          sed -i "s/VERSION: str = \".*\"/VERSION: str = \"${VERSION}\"/" app/config.py
          if [ ! -z "$UPDATER_TOKEN" ]; then
            sed -i "s/GITHUB_TOKEN: str = \".*\"/GITHUB_TOKEN: str = \"${UPDATER_TOKEN}\"/" app/config.py
            echo "Injected version: $VERSION and GitHub Token"
          else
            echo "Injected version: $VERSION (No GitHub Token provided)"
          fi

      - name: Build executable
        run: pyinstaller lexora-linux.spec

      - name: Create Debian (.deb) Installer
        run: |
          VERSION="${GITHUB_REF_NAME#lexora-v}"
          PKG_DIR="dist/lexora_${VERSION}_amd64"

          mkdir -p "${PKG_DIR}/DEBIAN"
          mkdir -p "${PKG_DIR}/opt/lexora"
          mkdir -p "${PKG_DIR}/usr/bin"
          mkdir -p "${PKG_DIR}/usr/share/applications"

          cat > "${PKG_DIR}/DEBIAN/control" << EOF
          Package: lexora
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0, python3-tk
          Maintainer: Lexora Team
          Description: Lexora Eye Tracker Service
           Cross-platform eye tracking service with setup wizard.
          EOF

          cp dist/Lexora "${PKG_DIR}/opt/lexora/"
          chmod +x "${PKG_DIR}/opt/lexora/Lexora"

          ln -s /opt/lexora/Lexora "${PKG_DIR}/usr/bin/lexora"

          cat > "${PKG_DIR}/usr/share/applications/lexora.desktop" << 'EOF'
          [Desktop Entry]
          Type=Application
          Name=Lexora
          Exec=/opt/lexora/Lexora
          Icon=lexora
          Categories=Utility;
          EOF

          dpkg-deb --build "${PKG_DIR}"
          mv "${PKG_DIR}.deb" dist/Lexora-Linux-Installer.deb

      - name: Upload Linux installer
        uses: actions/upload-artifact@v4
        with:
          name: lexora-linux
          path: tobii-service/dist/Lexora-Linux-Installer.deb

  create-release:
    needs: [ build-windows, build-macos, build-linux ]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # ✅ Fix: strip the 'lexora-v' prefix first, then check if the
      # remaining version string (e.g. "1.2.0" vs "1.2.0-beta") has a hyphen.
      - name: Check if pre-release
        id: version_check
        run: |
          VERSION="${GITHUB_REF_NAME#lexora-v}"
          if [[ "$VERSION" == *"-"* ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/lexora-windows/Lexora-Setup.exe
            artifacts/lexora-macos/Lexora-macOS-Installer.pkg
            artifacts/lexora-linux/Lexora-Linux-Installer.deb
          draft: false
          prerelease: ${{ steps.version_check.outputs.prerelease == 'true' }}
          body: |
            ## Lexora Eye Tracker Service

            Cross-platform eye tracking service with native setup wizards.

            ### Installation

            **Windows:**
            - Download `Lexora-Setup.exe`
            - Double-click to run the setup wizard

            **macOS:**
            - Download `Lexora-macOS-Installer.pkg`
            - Double-click to run the installer

            **Linux (Ubuntu/Debian):**
            - Download `Lexora-Linux-Installer.deb`
            - Double-click to install via Software Center, or run: `sudo dpkg -i Lexora-Linux-Installer.deb`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
