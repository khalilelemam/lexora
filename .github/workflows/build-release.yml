name: Build and Release\n\non: [push]\n\njobs:\n  build:\n    runs-on: windows-latest\n    steps:\n    - name: Checkout code\n      uses: actions/checkout@v2\n\n    - name: Install NSIS\n      run: choco install nsis\n\n    - name: Create Installer Script\n      run: |\n        echo '!include "LogicLib.nsh"' > installer.nsi\n        echo 'Name "Lexora Setup"' >> installer.nsi\n        echo 'OutFile "Lexora-Setup.exe"' >> installer.nsi\n        echo 'InstDir "$PROGRAMFILES\\Lexora"' >> installer.nsi\n        echo 'Section "Installation"' >> installer.nsi\n        echo '  SetOutPath "$INSTDIR"' >> installer.nsi\n        echo '  File "path\to\your\executable.exe"' >> installer.nsi\n        echo 'SectionEnd' >> installer.nsi\n\n    - name: Build Installer\n      run: makensis installer.nsi\n\n    - name: Upload Installer\n      uses: actions/upload-artifact@v2\n      with:\n        name: Lexora-Setup\n        path: Lexora-Setup.exe\n