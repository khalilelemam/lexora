name: Web Deploy (Sync Env + Deploy)

on:
  push:
    tags:
      - "lexora-web-v*"
  pull_request:
    paths:
      - "web/**"
  workflow_dispatch:

env:
  GITHUB_ENVIRONMENT: web-production

jobs:
  # ------------------------------------------------------------
  # JOB 1: Quality Check (Lint & Format)
  # ------------------------------------------------------------
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Check Formatting
        working-directory: web
        run: npx prettier --check .

      - name: Check Linting
        working-directory: web
        run: npm run lint

  # ------------------------------------------------------------
  # JOB 2: Deploy (Only on Tags or Manual Dispatch)
  # ------------------------------------------------------------
  deploy:
    needs: quality-check # Only deploy if code is clean!
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment:
      name: web-production
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            VERSION=${TAG_NAME#lexora-web-v}
            echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
            echo "Building Version: $VERSION"
          else
            echo "VERSION=manual" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Set Vercel credentials
        run: |
          echo "VERCEL_TOKEN=${{ secrets.VERCEL_TOKEN }}" >> "$GITHUB_ENV"
          echo "VERCEL_PROJECT_ID=${{ vars.VERCEL_PROJECT_ID }}" >> "$GITHUB_ENV"
          echo "VERCEL_ORG_ID=${{ vars.VERCEL_ORG_ID }}" >> "$GITHUB_ENV"

      # ------------------------------------------------------------
      # STEP: Sync Vars + Explicitly Set Version
      # ------------------------------------------------------------
      - name: Sync GitHub env vars to Vercel
        env:
          VARS_JSON: ${{ toJSON(vars) }}
          VERSION: ${{ steps.get_version.outputs.VERSION }}
        run: |
          bash .github/scripts/web-vercel-sync-env.sh

      - name: Pull Vercel config
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build
        run: vercel build --prod --token "$VERCEL_TOKEN"
        env:
          NEXT_PUBLIC_APP_VERSION: ${{ steps.get_version.outputs.VERSION }}

      - name: Deploy
        run: |
          DEPLOYMENT_URL=$(vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN")
          echo "Deployed to: $DEPLOYMENT_URL"

          # Explicitly alias your custom domain to this exact deployment
          vercel alias set "$DEPLOYMENT_URL" lexora.page --token "$VERCEL_TOKEN"
          echo "✓ lexora.page aliased to $DEPLOYMENT_URL"
