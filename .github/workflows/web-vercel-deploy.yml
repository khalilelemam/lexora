name: Web Deploy (Sync Env + Deploy)

on:
  workflow_dispatch:

env:
  GITHUB_ENVIRONMENT: web-production

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: web-vercel-deploy
      cancel-in-progress: false
    environment:
      name: web-production
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Set Vercel credentials
        run: |
          set -euo pipefail
          echo "::add-mask::${{ secrets.VERCEL_TOKEN }}"
          echo "VERCEL_TOKEN=${{ secrets.VERCEL_TOKEN }}" >> "$GITHUB_ENV"
          echo "VERCEL_PROJECT_ID=${{ vars.VERCEL_PROJECT_ID }}" >> "$GITHUB_ENV"
          echo "VERCEL_ORG_ID=${{ vars.VERCEL_ORG_ID }}" >> "$GITHUB_ENV"

      - name: Validate required Vercel credentials
        run: |
          set -euo pipefail
          for key in VERCEL_TOKEN VERCEL_PROJECT_ID VERCEL_ORG_ID; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required value: $key"
              exit 1
            fi
          done

      - name: Verify auth
        run: vercel whoami --token "$VERCEL_TOKEN"

      # ============================================================
      # STEP 1: Sync GitHub Variables to Vercel Dashboard
      # ============================================================
      # This is the critical fix. We push all relevant variables from
      # GitHub to Vercel's platform so they're available during
      # build and at runtime on Vercel's servers.
      # ============================================================
      - name: Sync GitHub env vars to Vercel
        working-directory: web
        env:
          VARS_JSON: ${{ toJSON(vars) }}
        run: |
          set -euo pipefail

          # Extract variables matching our criteria
          echo "$VARS_JSON" | jq -r '
            to_entries |
            map(select((.key | test("^NEXT_PUBLIC_")) or (.key == "ML_SERVICE_URL"))) |
            .[] | "\(.key)=\(.value)"
          ' > /tmp/vars_to_sync.txt

          if [ ! -s /tmp/vars_to_sync.txt ]; then
            echo "No deployable web variables found in GitHub environment."
            exit 1
          fi

          echo "Found variables to sync:"
          cat /tmp/vars_to_sync.txt | cut -d'=' -f1 | sed 's/^/  - /'

          # Push each variable to Vercel production environment
          while IFS='=' read -r key value; do
            echo "Syncing: $key"
            
            # Remove existing key from Vercel to avoid duplicates/errors
            # The '|| true' prevents failure if key doesn't exist yet
            vercel env rm "$key" production -y --token "$VERCEL_TOKEN" 2>/dev/null || true
            
            # Add the new value via stdin (required by vercel CLI)
            echo "$value" | vercel env add "$key" production --token "$VERCEL_TOKEN"
            
          done < /tmp/vars_to_sync.txt

          echo "All variables synced to Vercel successfully."

      # ============================================================
      # STEP 2: Pull Vercel config (now includes our synced vars)
      # ============================================================
      # After syncing, Vercel's platform has the variables. We pull
      # the project config, which now includes the env vars.
      # ============================================================
      - name: Pull Vercel config
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      # ============================================================
      # STEP 3: Build (Vercel now has access to synced variables)
      # ============================================================
      # Since variables are now in Vercel's dashboard, the build
      # process can read them. NEXT_PUBLIC_* will be baked into
      # the bundle. ML_SERVICE_URL will be available at runtime.
      # ============================================================
      - name: Build
        run: vercel build --prod --token "$VERCEL_TOKEN"

      # ============================================================
      # STEP 4: Deploy
      # ============================================================
      - name: Deploy
        run: vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
