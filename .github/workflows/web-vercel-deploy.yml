name: Web Deploy (Sync Env + Deploy)

on:
  workflow_dispatch:

env:
  GITHUB_ENVIRONMENT: web-production

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: web-vercel-deploy
      cancel-in-progress: false
    environment:
      name: web-production
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Set Vercel env
        run: |
          set -euo pipefail
          echo "::add-mask::${{ secrets.VERCEL_TOKEN }}"
          echo "VERCEL_TOKEN=${{ secrets.VERCEL_TOKEN }}" >> "$GITHUB_ENV"
          echo "VERCEL_PROJECT_ID=${{ vars.VERCEL_PROJECT_ID }}" >> "$GITHUB_ENV"
          echo "VERCEL_ORG_ID=${{ vars.VERCEL_ORG_ID }}" >> "$GITHUB_ENV"

      - name: Validate required Vercel credentials
        run: |
          set -euo pipefail
          for key in VERCEL_TOKEN VERCEL_PROJECT_ID VERCEL_ORG_ID; do
            if [ -z "${!key:-}" ]; then
              echo "Missing required value: $key"
              exit 1
            fi
          done

      - name: Verify auth
        run: vercel whoami --token "$VERCEL_TOKEN"

      - name: Generate .env.production.local
        working-directory: web
        env:
          VARS_JSON: ${{ toJSON(vars) }}
        run: |
          set -euo pipefail
          echo "$VARS_JSON" | jq -r 'to_entries | map(select((.key | test("^NEXT_PUBLIC_")) or (.key == "ML_SERVICE_URL"))) | .[] | "\(.key)=\(.value)"' > .env.production.local

          if [ ! -s .env.production.local ]; then
            echo "No deployable web variables found in GitHub environment."
            exit 1
          fi

          echo "Variables successfully injected for Vercel build."

      - name: Pull Vercel config
        run: vercel pull --yes --environment=production --token "$VERCEL_TOKEN"

      - name: Build
        run: vercel build --prod --token "$VERCEL_TOKEN"

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token "$VERCEL_TOKEN"
