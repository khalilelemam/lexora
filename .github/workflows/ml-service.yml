name: ML Service CI/CD

on:
  push:
    tags:
      - 'lexora-ml-v*'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'ml-service/**'
      - '.github/workflows/ml-service.yml'
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.12'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/lexora-ml

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff linter
        run: ruff check app/ tests/

      - name: Run Ruff formatter check
        run: ruff format --check app/ tests/

  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: ml-service/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run unit tests
        run: |
          pytest tests/ \
            --ignore=tests/integration/ \
            -v

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    defaults:
      run:
        working-directory: ml-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: ml-service/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run integration tests
        env:
          REAL_TF: "1"
        run: pytest tests/integration/ -v --tb=short

  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [lint, test, integration-test]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # 1. Capture the version from the tag (e.g., 1.0.0)
            type=match,pattern=lexora-ml-v(.*),group=1
            # 2. Also create a major.minor tag (e.g., 1.0)
            type=match,pattern=lexora-ml-v(\d+\.\d+),group=1
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./ml-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-azure:
    name: Deploy To Azure Container Apps
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: ml-service-azure-deploy
      cancel-in-progress: false
    environment:
      name: Production
    needs: build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Validate required secrets and variables
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PASSWORD: ${{ secrets.GHCR_PASSWORD }}
          AZURE_CONTAINERAPP_NAME: ${{ vars.AZURE_CONTAINERAPP_NAME }}
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
        run: |
          set -euo pipefail
          missing=0
          for key in AZURE_CLIENT_ID AZURE_TENANT_ID AZURE_SUBSCRIPTION_ID GHCR_USERNAME GHCR_PASSWORD AZURE_CONTAINERAPP_NAME AZURE_RESOURCE_GROUP; do
            if [ -z "${!key}" ]; then
              echo "Missing required value: $key"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo "Required secrets/variables are not configured."
            exit 1
          fi

      - name: Log in to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve image tag from git ref
        id: image
        run: |
          ref_name="${GITHUB_REF_NAME}"
          if [[ "$ref_name" =~ ^lexora-ml-v(.+)$ ]]; then
            echo "tag=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure Container App GHCR registry auth
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az containerapp registry set \
              --name "${{ vars.AZURE_CONTAINERAPP_NAME }}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --server ghcr.io \
              --username "${{ secrets.GHCR_USERNAME }}" \
              --password "${{ secrets.GHCR_PASSWORD }}"

      - name: Deploy latest image to Container App
        uses: azure/CLI@v2
        with:
          inlineScript: |
            cpu="1.0"
            memory="2.0Gi"
            min_replicas="1"
            max_replicas="1"
            az containerapp update \
              --name "${{ vars.AZURE_CONTAINERAPP_NAME }}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --image "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image.outputs.tag }}" \
              --cpu "$cpu" \
              --memory "$memory" \
              --min-replicas "$min_replicas" \
              --max-replicas "$max_replicas"

      - name: Verify deployed health endpoint
        uses: azure/CLI@v2
        with:
          inlineScript: |
            set -euo pipefail
            fqdn=$(az containerapp show \
              --name "${{ vars.AZURE_CONTAINERAPP_NAME }}" \
              --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
              --query properties.configuration.ingress.fqdn -o tsv)
            echo "Deployed URL: https://$fqdn"

            for i in $(seq 1 24); do
              if python3 -c "import urllib.request; urllib.request.urlopen('https://$fqdn/health', timeout=5).read()" >/dev/null 2>&1; then
                echo "Health check passed."
                exit 0
              fi
              echo "Waiting for service health ($i/24)..."
              sleep 5
            done

            echo "Health check did not pass in time."
            exit 1
