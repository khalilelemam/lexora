name: ML Service CI/CD

on:
  push:
    branches:
      - main
      - develop
    tags:
      - "lexora-ml-v*"
    paths:
      - "ml-service/**"
      - ".github/workflows/ml-service.yml"
      - ".github/workflows/ml-service-sync-env.yml"
      - ".github/workflows/ml-service-azure-bootstrap.yml"
      - ".github/workflows/ml-service-deploy-shared.yml"
      - ".github/scripts/ml-service-*.sh"
  pull_request:
    branches:
      - main
      - develop
    paths:
      - "ml-service/**"
      - ".github/workflows/ml-service.yml"
      - ".github/workflows/ml-service-sync-env.yml"
      - ".github/workflows/ml-service-azure-bootstrap.yml"
      - ".github/workflows/ml-service-deploy-shared.yml"
      - ".github/scripts/ml-service-*.sh"
  workflow_dispatch:
    inputs:
      reason:
        description: Optional note for manually running the ML service validation pipeline
        required: false
        default: manual-validation-run

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/lexora-ml

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff linter
        run: ruff check app/ tests/

      - name: Run Ruff formatter check
        run: ruff format --check app/ tests/

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: ml-service/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run unit tests
        run: |
          pytest tests/ \
            --ignore=tests/integration/ \
            -v

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: ml-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: ml-service/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run integration tests
        env:
          REAL_TF: "1"
        run: pytest tests/integration/ -v --tb=short

  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - integration-test
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image locally
        uses: docker/build-push-action@v5
        with:
          context: ./ml-service
          push: false
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:workflow-dispatch-check
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build:
    name: Build And Push Docker Image
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - integration-test
    if: startsWith(github.ref, 'refs/tags/lexora-ml-v')
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.image_tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Resolve image tag from git ref
        id: image_tag
        shell: bash
        run: |
          set -euo pipefail
          ref_name="${GITHUB_REF_NAME}"

          if [[ "$ref_name" =~ ^lexora-ml-v(.+)$ ]]; then
            echo "tag=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "Unexpected ref: $ref_name"
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=match,pattern=lexora-ml-v(.*),group=1
            type=match,pattern=lexora-ml-v(\d+\.\d+),group=1
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./ml-service
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-azure:
    name: Deploy To Azure Container Apps
    needs: build
    if: startsWith(github.ref, 'refs/tags/lexora-ml-v')
    uses: ./.github/workflows/ml-service-deploy-shared.yml
    permissions:
      contents: read
      id-token: write
    with:
      imageTag: ${{ needs.build.outputs.image_tag }}
      updateImage: true
      verifyHealth: true
    secrets: inherit
