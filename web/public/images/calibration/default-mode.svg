<svg xmlns="http://www.w3.org/2000/svg" width="480" height="300" viewBox="0 0 480 300">
  <!-- Warm cream background -->
  <rect width="480" height="300" fill="#FDF8F0" rx="8"/>

  <!-- Grid dots (calibration point pattern) -->
  <g fill="#4A7C59" opacity="0.2">
    <circle cx="96" cy="60" r="4"/>
    <circle cx="240" cy="60" r="4"/>
    <circle cx="384" cy="60" r="4"/>
    <circle cx="96" cy="150" r="4"/>
    <circle cx="384" cy="150" r="4"/>
    <circle cx="96" cy="240" r="4"/>
    <circle cx="240" cy="240" r="4"/>
    <circle cx="384" cy="240" r="4"/>
  </g>

  <!-- Active target with rings -->
  <circle cx="240" cy="150" r="30" fill="none" stroke="#4A7C59" stroke-width="2" opacity="0.15"/>
  <circle cx="240" cy="150" r="22" fill="none" stroke="#4A7C59" stroke-width="1.5" opacity="0.25"/>
  <circle cx="240" cy="150" r="14" fill="none" stroke="#4A7C59" stroke-width="1" opacity="0.35"/>

  <!-- Center dot (charcoal) -->
  <circle cx="240" cy="150" r="7" fill="#2D2A26"/>

  <!-- Progress ring -->
  <circle cx="240" cy="150" r="30" fill="none" stroke="#4A7C59" stroke-width="3" opacity="0.6"
    stroke-dasharray="120 70" stroke-linecap="round"
    transform="rotate(-90 240 150)"/>

  <!-- Completed dots (filled sage) -->
  <g fill="#4A7C59" opacity="0.6">
    <circle cx="96" cy="60" r="5"/>
    <circle cx="240" cy="60" r="5"/>
    <circle cx="384" cy="60" r="5"/>
  </g>

  <!-- Label -->
  <text x="240" y="280" text-anchor="middle" fill="#2D2A26" font-size="14" font-family="system-ui, sans-serif" font-weight="600" opacity="0.7">
    Grid Mode
  </text>
</svg>
