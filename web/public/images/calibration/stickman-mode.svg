<svg xmlns="http://www.w3.org/2000/svg" width="480" height="300" viewBox="0 0 480 300">
  <!-- Warm cream background matching calibration theme -->
  <rect width="480" height="300" fill="#FDF8F0" rx="8"/>
  
  <!-- Subtle warm grid lines -->
  <line x1="0" y1="60" x2="480" y2="60" stroke="#2D2A26" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="120" x2="480" y2="120" stroke="#2D2A26" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="180" x2="480" y2="180" stroke="#2D2A26" stroke-width="0.5" opacity="0.05"/>
  <line x1="0" y1="240" x2="480" y2="240" stroke="#2D2A26" stroke-width="0.5" opacity="0.05"/>
  <line x1="96" y1="0" x2="96" y2="300" stroke="#2D2A26" stroke-width="0.5" opacity="0.05"/>
  <line x1="192" y1="0" x2="192" y2="300" stroke="#2D2A26" stroke-width="0.5" opacity="0.05"/>
  <line x1="288" y1="0" x2="288" y2="300" stroke="#2D2A26" stroke-width="0.5" opacity="0.05"/>
  <line x1="384" y1="0" x2="384" y2="300" stroke="#2D2A26" stroke-width="0.5" opacity="0.05"/>

  <!-- Ninja stickman -->
  <g transform="translate(240, 130)">
    <!-- Head with mask -->
    <circle cx="0" cy="-36" r="18" stroke="#2D2A26" stroke-width="4" fill="none"/>
    <rect x="-16" y="-42" width="32" height="8" rx="3" fill="#2D2A26"/>
    <circle cx="-6" cy="-39" r="2" fill="#FDF8F0"/>
    <circle cx="6" cy="-39" r="2" fill="#FDF8F0"/>
    <!-- Body -->
    <path d="M0 -18V30" stroke="#2D2A26" stroke-width="4" stroke-linecap="round"/>
    <!-- Arms (action pose) -->
    <path d="M0 -6L-30 8" stroke="#2D2A26" stroke-width="4" stroke-linecap="round"/>
    <path d="M0 -6L28 -18" stroke="#2D2A26" stroke-width="4" stroke-linecap="round"/>
    <!-- Legs (running) -->
    <path d="M0 30L-20 60" stroke="#2D2A26" stroke-width="4" stroke-linecap="round"/>
    <path d="M0 30L22 58" stroke="#2D2A26" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Speed lines -->
  <line x1="140" y1="115" x2="180" y2="115" stroke="#DC2626" stroke-width="2" opacity="0.4"/>
  <line x1="135" y1="130" x2="185" y2="130" stroke="#DC2626" stroke-width="2.5" opacity="0.5"/>
  <line x1="145" y1="145" x2="190" y2="145" stroke="#DC2626" stroke-width="1.5" opacity="0.3"/>
  <line x1="140" y1="160" x2="175" y2="160" stroke="#DC2626" stroke-width="2" opacity="0.35"/>

  <!-- Red scan ring target indicator -->
  <circle cx="240" cy="130" r="42" fill="none" stroke="#DC2626" stroke-width="3" opacity="0.25"/>
  <circle cx="240" cy="130" r="42" fill="none" stroke="#DC2626" stroke-width="3" opacity="0.6"
    stroke-dasharray="165 100" stroke-linecap="round"/>

  <!-- Hit sparks -->
  <circle cx="275" cy="105" r="3" fill="#DC2626" opacity="0.6"/>
  <circle cx="285" cy="120" r="2" fill="#DC2626" opacity="0.4"/>
  <circle cx="270" cy="140" r="2.5" fill="#DC2626" opacity="0.5"/>

  <!-- Label -->
  <text x="240" y="260" text-anchor="middle" fill="#2D2A26" font-size="14" font-family="system-ui, sans-serif" font-weight="600" opacity="0.7">
    Ninja Mode
  </text>
</svg>
