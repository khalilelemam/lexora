<svg xmlns="http://www.w3.org/2000/svg" width="480" height="300" viewBox="0 0 480 300">
  <!-- Grid background -->
  <rect width="480" height="300" fill="#1b2021" rx="8"/>
  
  <!-- Subtle grid lines -->
  <line x1="0" y1="60" x2="480" y2="60" stroke="#333" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="120" x2="480" y2="120" stroke="#333" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="180" x2="480" y2="180" stroke="#333" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="240" x2="480" y2="240" stroke="#333" stroke-width="0.5" opacity="0.3"/>
  <line x1="96" y1="0" x2="96" y2="300" stroke="#333" stroke-width="0.5" opacity="0.3"/>
  <line x1="192" y1="0" x2="192" y2="300" stroke="#333" stroke-width="0.5" opacity="0.3"/>
  <line x1="288" y1="0" x2="288" y2="300" stroke="#333" stroke-width="0.5" opacity="0.3"/>
  <line x1="384" y1="0" x2="384" y2="300" stroke="#333" stroke-width="0.5" opacity="0.3"/>

  <!-- Explosion particles (sage/olive colored) -->
  <circle cx="170" cy="110" r="3" fill="#a6a867" opacity="0.6"/>
  <circle cx="155" cy="95" r="2" fill="#a6a867" opacity="0.4"/>
  <circle cx="185" cy="100" r="2.5" fill="#e3dc95" opacity="0.5"/>
  <circle cx="145" cy="120" r="2" fill="#a6a867" opacity="0.3"/>
  <circle cx="190" cy="125" r="1.5" fill="#e3dc95" opacity="0.4"/>
  <circle cx="160" cy="85" r="1.5" fill="#a6a867" opacity="0.35"/>

  <!-- Stickman figure (dark, silhouette style) -->
  <!-- Head -->
  <circle cx="260" cy="100" r="18" fill="none" stroke="#e3dcc2" stroke-width="2.5"/>
  <!-- Eyes -->
  <circle cx="254" cy="97" r="2" fill="#e3dcc2"/>
  <circle cx="266" cy="97" r="2" fill="#e3dcc2"/>
  <!-- Body -->
  <line x1="260" y1="118" x2="260" y2="190" stroke="#e3dcc2" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Arms (action pose) -->
  <line x1="260" y1="140" x2="228" y2="158" stroke="#e3dcc2" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="260" y1="140" x2="295" y2="152" stroke="#e3dcc2" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Legs (running pose) -->
  <line x1="260" y1="190" x2="235" y2="230" stroke="#e3dcc2" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="260" y1="190" x2="285" y2="225" stroke="#e3dcc2" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Gaze scan ring (around calibration point) -->
  <circle cx="170" cy="110" r="22" fill="none" stroke="#a6a867" stroke-width="2" opacity="0.6" stroke-dasharray="35 104"/>
  <circle cx="170" cy="110" r="5" fill="#a6a867" opacity="0.5"/>

  <!-- Health bar -->
  <rect x="210" y="252" width="100" height="8" rx="4" fill="#333" opacity="0.5"/>
  <rect x="210" y="252" width="65" height="8" rx="4" fill="#a6a867" opacity="0.8"/>

  <!-- Score label -->
  <text x="240" y="278" text-anchor="middle" fill="#e3dcc2" font-family="sans-serif" font-size="11" opacity="0.5">DEFEAT WITH YOUR GAZE</text>
</svg>
