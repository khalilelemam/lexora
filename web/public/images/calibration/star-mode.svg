<svg xmlns="http://www.w3.org/2000/svg" width="480" height="300" viewBox="0 0 480 300">
  <!-- Warm cream background -->
  <rect width="480" height="300" fill="#FDF8F0" rx="8"/>

  <!-- Subtle warm radial glow -->
  <defs>
    <radialGradient id="starGlow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#D97706" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#D97706" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="480" height="300" fill="url(#starGlow)"/>

  <!-- Past star positions (small, faded) -->
  <g opacity="0.25">
    <path d="M96 60l3.5 7 7.5 1.1-5.5 5.3 1.3 7.6-6.8-3.6-6.8 3.6 1.3-7.6-5.5-5.3 7.5-1.1z" fill="#D97706"/>
    <path d="M240 60l3.5 7 7.5 1.1-5.5 5.3 1.3 7.6-6.8-3.6-6.8 3.6 1.3-7.6-5.5-5.3 7.5-1.1z" fill="#D97706"/>
    <path d="M384 60l3.5 7 7.5 1.1-5.5 5.3 1.3 7.6-6.8-3.6-6.8 3.6 1.3-7.6-5.5-5.3 7.5-1.1z" fill="#D97706"/>
  </g>

  <!-- Active star (center, larger, golden) -->
  <g transform="translate(240,150)">
    <!-- Glow ring -->
    <circle r="36" fill="none" stroke="#D97706" stroke-width="2" opacity="0.15"/>
    <!-- Amber background circle -->
    <circle r="28" fill="#D97706" opacity="0.08"/>
    <!-- Star -->
    <path d="M0-20l6.2 12.5 13.8 2-10 9.7 2.4 13.8L0 11.4-12.4 18l2.4-13.8-10-9.7 13.8-2z" fill="#D97706"/>
    <!-- Progress ring -->
    <circle r="36" fill="none" stroke="#D97706" stroke-width="3" opacity="0.6"
      stroke-dasharray="140 90" stroke-linecap="round"
      transform="rotate(-90)"/>
  </g>

  <!-- Label -->
  <text x="240" y="260" text-anchor="middle" fill="#2D2A26" font-size="14" font-family="system-ui, sans-serif" font-weight="600" opacity="0.7">
    Star Mode
  </text>
</svg>
